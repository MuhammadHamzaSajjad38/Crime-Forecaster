<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Crime Forecaster</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <!-- Adding Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- ... inside layout.html ... -->
<header>
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <span class="logo-icon">C</span> Crime Forecaster
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <!-- This is the container for all navigation items -->
            <div class="collapse navbar-collapse" id="navbarNav">
                <!-- *** UPDATED: A single list for all nav items *** -->
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('predictor') }}">Predictor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('dataset') }}">Data Insights</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('model_tech') }}">Model</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('team') }}">Our Team</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{{ url_for('about') }}">Model Results</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
<!-- ... -->

    <main role="main">
        {% block content %}{% endblock %}
    </main>

    <footer class="text-center py-4 text-secondary">
        <p>Chicago Crime Prediction Model - - Complete End-to-End Project</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
